# import = ["~/.config/alacritty/themes/themes/tokyo_night_storm.toml"]
import = ["~/.config/alacritty/themes/themes/vscode.toml"]
# import = ["~/.config/alacritty/themes/themes/doom_one.toml"]
# import = ["~/.config/alacritty/themes/themes/blood_moon.toml"]

[env]
TERM = "screen-256color"

[window]
padding.x = 0
padding.y = 0
dynamic_padding = true
decorations = "none"
opacity = 1
option_as_alt = "Both"

[font]
normal.family = "JetBrainsMono Nerd Font Mono"
normal.style = "Medium"
bold.family = "JetBrainsMono Nerd Font Mono"
bold.style = "Bold"
italic.family = "JetBrainsMono Nerd Font Mono"
italic.style = "Italic"
bold_italic.family = "JetBrainsMono Nerd Font Mono"
bold_italic.style = "Bold Italic"

size = 24

[keyboard]
bindings = [
  { key = "N", mods = "Command", action = "CreateNewWindow" }
]
